# Netlify build configuration for the Vertical Drama Kit Next.js site.
#
# Netlify's official Next.js Runtime (@netlify/plugin-nextjs) is resolved
# and installed automatically by Netlify's build system from the
# [[plugins]] entry below — it does not need to be a package.json
# dependency. It gives this Next.js 14 App Router site full support for
# next/image optimization, static prerendering, and route metadata files
# (robots, sitemap, manifest, icons) with zero extra configuration.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Baseline security headers. No CSP is set here: this app injects inline
# JSON-LD (<script type="application/ld+json">) and relies on Next.js's own
# hydration scripts, so a correct CSP would need per-deploy nonces/hashes —
# add one deliberately if you introduce a CSP later, rather than enabling a
# blanket policy that could silently break structured data or hydration.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Immutable, far-future caching for Next.js's hashed static assets.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
